<!-- Firebase Auth модуль для всех страниц -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC_erJyfCASKgjMaMXTF4ovqfwfC4-5GmU",
    authDomain: "checktheworld-a631d.firebaseapp.com",
    projectId: "checktheworld-a631d",
    storageBucket: "checktheworld-a631d.firebasestorage.app",
    messagingSenderId: "1006756841439",
    appId: "1:1006756841439:web:ab81d8f3f469ea3d07666a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    const btn = document.getElementById('nav-auth-btn');
    if (!btn) return;
    if (user) {
      // Показываем имя + кнопку кабинета
      const name = user.displayName || user.email.split('@')[0];
      btn.innerHTML = `
        <a href="dashboard.html" style="
          display:inline-flex;align-items:center;gap:8px;
          padding:8px 16px;background:var(--green-light);color:var(--green);
          border-radius:8px;font-size:14px;font-weight:600;
          text-decoration:none;transition:background .15s;border:1px solid rgba(28,122,84,.2)
        " onmouseover="this.style.background='#c5eadb'" onmouseout="this.style.background='var(--green-light)'">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="5.5" r="2.5" stroke="#1c7a54" stroke-width="1.4"/>
            <path d="M3 13.5c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="#1c7a54" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          ${name}
        </a>
      `;
    } else {
      // Кнопка входа
      btn.innerHTML = `
        <a href="login.html" style="
          display:inline-block;padding:9px 20px;
          background:var(--green);color:#fff;
          border-radius:8px;font-size:14px;font-weight:600;
          text-decoration:none;transition:background .15s
        " onmouseover="this.style.background='#165f41'" onmouseout="this.style.background='var(--green)'">
          Войти
        </a>
      `;
    }
  });

  // Выход — вызывать через window.ctw_logout()
  window.ctw_logout = () => signOut(auth).then(() => window.location.href = 'login.html');
</script>
