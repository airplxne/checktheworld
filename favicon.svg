<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- warm background -->
  <rect width="64" height="64" rx="14" fill="#fef3e2"/>
  <!-- eye shape (green) -->
  <path d="M4 32 Q32 8 60 32 Q32 56 4 32Z" fill="#1c7a54"/>
  <!-- eyeball white -->
  <circle cx="32" cy="32" r="13" fill="#faf8f2"/>
  <!-- globe lines on eyeball -->
  <ellipse cx="32" cy="32" rx="6" ry="13" fill="none" stroke="#30b278" stroke-width="1.2"/>
  <line x1="19" y1="32" x2="45" y2="32" stroke="#30b278" stroke-width="1.2"/>
  <line x1="20" y1="26" x2="44" y2="26" stroke="#30b278" stroke-width="0.8" opacity=".55"/>
  <line x1="20" y1="38" x2="44" y2="38" stroke="#30b278" stroke-width="0.8" opacity=".55"/>
  <circle cx="32" cy="32" r="13" fill="none" stroke="#1c7a54" stroke-width="0.6"/>
  <!-- pupil -->
  <circle cx="32" cy="32" r="4.5" fill="#1a1a18"/>
  <!-- glint -->
  <circle cx="34" cy="30" r="1.4" fill="#ffffff" opacity=".7"/>
</svg>
